name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    name: QA (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies (dev)
        run: composer install --no-interaction --no-progress

      - name: Code style check (PHPCS)
        run: composer lint

      - name: Code beautifier dry-run (PHPCBF)
        run: composer format-check

      - name: Static analysis (PHPStan)
        run: composer stan

      - name: Tests (PHPUnit)
        run: composer test

      - name: QA summary
        if: always()
        run: |
          {
            echo "## QA Summary"
            echo "- PHP version: ${{ matrix.php }}"
            echo "- Commands: lint, format-check, stan, test"
          } >> "$GITHUB_STEP_SUMMARY"
